<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>iGreen Energy – Simulador de Economia</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<style>
/* ── TOKENS iBOARD ───────────────────────────────────────────── */
:root {
  --bg:      #0d1117;
  --s1:      #1a2535;
  --s2:      #1e2c3e;
  --s3:      #243348;
  --b1:      rgba(255,255,255,0.06);
  --b2:      rgba(255,255,255,0.10);
  --green:   #32D74B;
  --gb:      #3DBE66;
  --gd:      rgba(50,215,75,0.13);
  --gg:      rgba(61,190,102,0.22);
  --text:    rgba(255,255,255,0.92);
  --dim:     rgba(255,255,255,0.55);
  --muted:   rgba(255,255,255,0.28);
  --red:     #FF453A;
  --rd:      rgba(255,69,58,0.10);
  --blue:    #a78bfa;
  --bd:      rgba(167,139,250,0.12);
  --font:    'Poppins', sans-serif;
  --nm-out:  4px 4px 12px rgba(0,0,0,0.55), -2px -2px 6px rgba(255,255,255,0.03);
  --nm-in:   inset 3px 3px 8px rgba(0,0,0,0.5), inset -2px -2px 5px rgba(255,255,255,0.03);
  --nm-btn:  3px 3px 8px rgba(0,0,0,0.5), -1px -1px 4px rgba(255,255,255,0.03);
  --nm-card: 6px 6px 18px rgba(0,0,0,0.55), -2px -2px 8px rgba(255,255,255,0.025);
  --nm-green:3px 3px 8px rgba(0,0,0,0.5), -1px -1px 4px rgba(50,215,75,0.15);
  /* aliases compat */
  --surface:      var(--s1);
  --surface2:     var(--s2);
  --border:       rgba(255,255,255,0.08);
  --border2:      rgba(255,255,255,0.12);
  --green-muted:  var(--gd);
  --green-dim:    var(--gg);
  --green-border: rgba(50,215,75,0.3);
  --text-muted:   var(--dim);
  --text-dim:     var(--dim);
  --red-muted:    var(--rd);
  --blue-muted:   var(--bd);
  --radius:       10px;
  --radius-lg:    16px;
}

/* ── RESET + BASE ────────────────────────────────────────────── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
input[type=number]::-webkit-inner-spin-button,
input[type=number]::-webkit-outer-spin-button{-webkit-appearance:none;margin:0;}
input[type=number]{-moz-appearance:textfield;}

html,body {
  width:100%;min-height:100vh;
  background:var(--bg);color:var(--text);
  font-family:var(--font);font-weight:300;
  -webkit-font-smoothing:antialiased;
  font-size:14px;display:flex;flex-direction:column;
}

body::before {
  content:'';position:fixed;inset:0;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.035'/%3E%3C/svg%3E");
  pointer-events:none;z-index:0;opacity:0.45;
}

/* ── HEADER ──────────────────────────────────────────────────── */
header {
  position:sticky;top:0;z-index:50;
  background:var(--s1);
  box-shadow:0 2px 12px rgba(0,0,0,0.5),0 1px 0 rgba(255,255,255,0.03);
  padding:0 32px;
  display:flex;align-items:center;justify-content:flex-start;gap:12px;
  height:58px;
}

.logo-icon {
  width:34px;height:34px;border-radius:10px;
  background:var(--s1);
  box-shadow:var(--nm-btn);
  display:flex;align-items:center;justify-content:center;
  color:var(--gb);font-weight:600;font-size:12px;letter-spacing:-0.5px;
  border:1px solid rgba(53,196,138,0.2);
}

.logo-text { font-size:15px;font-weight:500;color:var(--text);letter-spacing:0.3px; }
.logo-sub  { font-size:9.5px;color:var(--dim);letter-spacing:0.15em;text-transform:uppercase;margin-top:1px; }

/* ── BREADCRUMB ──────────────────────────────────────────────── */
.breadcrumb {
  padding:12px 32px 0;font-size:11.5px;color:var(--dim);
  display:flex;align-items:center;gap:6px;
}
.breadcrumb a { color:var(--dim);text-decoration:none; }
.breadcrumb a:hover { color:var(--gb); }
.breadcrumb .sep { opacity:0.3; }
.breadcrumb .current { color:var(--gb);font-weight:400; }

/* ── MAIN LAYOUT ─────────────────────────────────────────────── */
main {
  flex:1;padding:24px 32px 40px;
  display:flex;gap:20px;flex-wrap:wrap;align-items:flex-start;
  position:relative;z-index:1;
}

/* ── CARD (form) ─────────────────────────────────────────────── */
.card {
  background:var(--s1);
  box-shadow:var(--nm-card);
  border-radius:var(--radius-lg);
  padding:24px;
  flex:1;min-width:300px;max-width:500px;
  border:none;
  position:relative;overflow:hidden;
}
.card::before {
  content:'';position:absolute;top:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,rgba(53,196,138,0.2),transparent);
}

.card-sub {
  font-size:11.5px;color:var(--dim);
  margin-bottom:20px;line-height:1.55;font-weight:300;
}

/* ── SECTION LABEL ───────────────────────────────────────────── */
.section-title {
  font-size:9.5px;font-weight:500;
  text-transform:uppercase;letter-spacing:3px;
  color:var(--muted);margin:22px 0 14px;
  display:flex;align-items:center;gap:14px;
}
.section-title:first-child { margin-top:0; }
.section-title::after { content:'';flex:1;height:1px;background:rgba(255,255,255,0.04); }

/* ── FIELDS ──────────────────────────────────────────────────── */
.field { margin-bottom:12px; }

label {
  display:block;font-size:11px;color:var(--dim);
  font-weight:400;margin-bottom:6px;letter-spacing:0.3px;
}

.input-wrap { position:relative; }

.prefix {
  position:absolute;left:12px;top:50%;transform:translateY(-50%);
  font-size:13px;color:var(--dim);pointer-events:none;user-select:none;
}
.suffix {
  position:absolute;right:12px;top:50%;transform:translateY(-50%);
  font-size:11px;color:var(--dim);pointer-events:none;user-select:none;
}

input {
  width:100%;
  padding:10px 14px;
  border-radius:10px;
  border:1px solid rgba(255,255,255,0.05);
  font-size:13px;color:var(--text);
  background:linear-gradient(145deg,var(--bg),var(--s1));
  font-family:var(--font);font-weight:300;
  box-shadow:inset 3px 3px 7px rgba(0,0,0,0.35),inset -1px -1px 3px rgba(255,255,255,0.04);
  transition:all 0.2s;outline:none;
}
input::placeholder { color:var(--muted);opacity:0.8; }
input.has-prefix   { padding-left:30px; }
input.has-suffix   { padding-right:42px; }
input:focus {
  border-color:rgba(53,196,138,0.3);
  box-shadow:inset 3px 3px 7px rgba(0,0,0,0.35),inset -1px -1px 3px rgba(255,255,255,0.04),0 0 0 2px rgba(53,196,138,0.12);
}

.row-2 { display:grid;grid-template-columns:1fr 1fr;gap:12px; }

/* ── BUTTONS ─────────────────────────────────────────────────── */
.btn {
  width:100%;padding:11px 20px;border-radius:12px;
  font-size:13px;font-weight:500;cursor:pointer;border:none;
  margin-top:8px;display:flex;align-items:center;justify-content:center;
  gap:8px;font-family:var(--font);letter-spacing:0.3px;
  transition:all 0.18s;
}
.btn:active { transform:translateY(1px); }
.btn:disabled { opacity:0.4;cursor:not-allowed; }

.btn-green {
  background:linear-gradient(180deg,#42ce6f 0%,#3DBE66 100%);
  color:#fff;font-weight:600;margin-top:20px;
  box-shadow:4px 4px 12px rgba(0,0,0,0.5),-1px -1px 6px rgba(61,190,102,0.2),inset 0 1px 0 rgba(255,255,255,0.2);
}
.btn-green:hover:not(:disabled) {
  background:linear-gradient(180deg,#4ae07a 0%,#36b05a 100%);
  box-shadow:6px 6px 14px rgba(0,0,0,0.5),-1px -1px 8px rgba(61,190,102,0.25),inset 0 1px 0 rgba(255,255,255,0.25);
  transform:translateY(-1px);
}

.btn-wa-main {
  background:linear-gradient(145deg,#2edb6e,#1a8a42);
  color:#fff;font-weight:600;
  box-shadow:4px 4px 12px rgba(0,0,0,0.5),-1px -1px 6px rgba(37,211,102,0.15),inset 0 1px 0 rgba(255,255,255,0.2);
}
.btn-wa-main:hover:not(:disabled) {
  box-shadow:6px 6px 14px rgba(0,0,0,0.5),-1px -1px 8px rgba(37,211,102,0.2),inset 0 1px 0 rgba(255,255,255,0.25);
  transform:translateY(-1px);
}

/* ── SEND AREA ───────────────────────────────────────────────── */
.send-area { display:flex;flex-direction:column;gap:8px; }

.phone-field-wrap {
  display:flex;align-items:center;gap:0;
  border-radius:10px;overflow:hidden;
  box-shadow:inset 3px 3px 7px rgba(0,0,0,0.35),inset -1px -1px 3px rgba(255,255,255,0.04);
  border:1px solid rgba(255,255,255,0.05);
  background:linear-gradient(145deg,var(--bg),var(--s1));
}
.phone-icon {
  padding:0 10px;display:flex;align-items:center;
  border-right:1px solid rgba(255,255,255,0.05);
  color:var(--dim);user-select:none;flex-shrink:0;height:40px;
}
.phone-field {
  flex:1;padding:9px 10px;border:none;background:transparent;
  color:var(--dim);font-size:13px;font-family:var(--font);
  outline:none;cursor:default;letter-spacing:0.02em;
}
.phone-field:not([readonly]) { color:var(--text);cursor:text; }
.phone-field::placeholder { color:var(--muted);opacity:0.8; }

.btn-edit-phone {
  padding:0 10px;display:flex;align-items:center;gap:5px;
  background:transparent;border-left:1px solid rgba(255,255,255,0.05);
  border-right:none;border-top:none;border-bottom:none;
  color:var(--dim);font-size:11px;font-weight:400;font-family:var(--font);
  cursor:pointer;height:40px;white-space:nowrap;transition:color 0.15s;flex-shrink:0;
}
.btn-edit-phone:hover { color:var(--gb); }

/* ── SUCCESS STATE ───────────────────────────────────────────── */
.send-success {
  display:flex;align-items:center;justify-content:space-between;gap:10px;
  background:rgba(37,211,102,0.07);
  border:1px solid rgba(37,211,102,0.2);
  border-radius:10px;padding:11px 14px;margin-top:8px;
}
.send-success .msg {
  display:flex;align-items:center;gap:7px;
  font-size:13px;color:#25d366;font-weight:400;
}
.btn-preview {
  padding:6px 12px;border-radius:8px;
  border:1px solid rgba(255,255,255,0.06);
  background:linear-gradient(145deg,var(--s2),var(--s3));
  color:var(--dim);font-size:11.5px;font-weight:400;
  font-family:var(--font);cursor:pointer;text-decoration:none;
  display:flex;align-items:center;gap:5px;white-space:nowrap;
  box-shadow:var(--nm-btn);transition:all 0.15s;
}
.btn-preview:hover { color:var(--text);box-shadow:var(--nm-out); }

/* ── SEND CARD ───────────────────────────────────────────────── */
.send-card {
  background:var(--s1);box-shadow:var(--nm-card);
  border-radius:var(--radius-lg);overflow:hidden;border:none;
}
.send-card-header {
  padding:12px 16px;
  border-bottom:1px solid rgba(255,255,255,0.04);
  font-size:9.5px;font-weight:500;
  text-transform:uppercase;letter-spacing:3px;color:var(--muted);
}

/* ── HSM PREVIEW ─────────────────────────────────────────────── */
.hsm-preview {
  padding:16px;background:#e5ddd5;
  border-bottom:1px solid rgba(255,255,255,0.04);
  display:flex;justify-content:flex-start;
}
.hsm-bubble {
  background:#fff;border-radius:0 8px 8px 8px;
  max-width:280px;width:100%;
  box-shadow:0 1px 2px rgba(0,0,0,0.15);overflow:hidden;position:relative;
}
.hsm-bubble::before {
  content:'';position:absolute;top:0;left:-8px;
  width:0;height:0;border-top:8px solid #fff;border-left:8px solid transparent;
}
.hsm-bubble-body {
  padding:8px 10px 4px;
  font-family:-apple-system,'Segoe UI',sans-serif;
  font-size:13.5px;color:#111b21;line-height:1.55;
}
.hsm-bubble-body .hsm-title { font-weight:700;font-size:14px;color:#111b21;margin-bottom:5px; }
.hsm-bubble-body p { color:#3b4a54;font-size:13px;margin-bottom:3px; }
.hsm-bubble-time {
  text-align:right;font-size:11px;color:#8696a0;
  padding:2px 8px 6px;font-family:-apple-system,'Segoe UI',sans-serif;
}
.hsm-divider { height:1px;background:#e9edef; }
.hsm-cta {
  display:flex;align-items:center;justify-content:center;gap:6px;
  padding:10px 12px;font-family:-apple-system,'Segoe UI',sans-serif;
  font-size:14px;color:#027eb5;text-decoration:none;cursor:pointer;
  background:transparent;border:none;width:100%;transition:background 0.1s;
}
.hsm-cta:hover { background:#f5f6f6; }

/* ── SEND FOOTER ─────────────────────────────────────────────── */
.send-card-footer { padding:12px 16px;display:flex;flex-direction:column;gap:8px; }
.phone-label {
  font-size:9.5px;font-weight:500;
  text-transform:uppercase;letter-spacing:2px;color:var(--muted);margin-bottom:2px;
}

/* ── RESULT AREA ─────────────────────────────────────────────── */
.result-card {
  flex:1;min-width:560px;
  display:flex;flex-direction:row;align-items:flex-start;gap:16px;
}
.res-panel { flex:1;min-width:280px; }

/* Empty state */
.empty-state {
  flex:1;display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:12px;
  color:var(--dim);text-align:center;padding:48px;
  border-radius:var(--radius-lg);min-height:300px;
  background:var(--s1);box-shadow:var(--nm-card);
}
.empty-state p { font-size:12.5px;line-height:1.5;font-weight:300; }

/* Result panel */
.res-panel {
  background:var(--s1);box-shadow:var(--nm-card);
  border-radius:var(--radius-lg);overflow:hidden;
}
.res-header { background:var(--s2);border-bottom:1px solid rgba(255,255,255,0.04);padding:16px 20px; }
.res-header h2 { font-size:14px;font-weight:500;color:var(--text);letter-spacing:0.3px; }
.res-header p  { font-size:11.5px;color:var(--dim);margin-top:2px;font-weight:300; }

.res-body { padding:0 20px 4px; }
.res-row {
  display:flex;justify-content:space-between;align-items:center;
  padding:10px 0;border-bottom:1px solid rgba(255,255,255,0.04);
  font-size:13px;gap:12px;
}
.res-row:last-child { border-bottom:none; }
.res-row .lbl { color:var(--dim);line-height:1.4;flex:1;font-weight:300; }
.res-row .lbl small { display:block;font-size:10.5px;color:var(--muted);margin-top:1px; }
.res-row .val { font-weight:500;color:var(--text);white-space:nowrap; }
.res-row .val.red   { color:var(--red); }
.res-row .val.green { color:var(--gb); }

.res-divider { height:1px;background:rgba(255,255,255,0.04);margin:2px 0; }

.res-total {
  background:var(--gd);border-top:1px solid rgba(53,196,138,0.2);
  padding:14px 20px;display:flex;justify-content:space-between;align-items:center;gap:12px;
}
.res-total .lbl { font-size:12px;font-weight:500;color:var(--gb); }
.res-total .val { font-size:22px;font-weight:600;color:var(--gb); }

.res-annual {
  background:var(--bd);border-top:1px solid rgba(74,158,255,0.2);
  border-radius:0 0 var(--radius-lg) var(--radius-lg);
  padding:14px 20px;display:flex;justify-content:space-between;align-items:center;gap:12px;
}
.res-annual .lbl { font-size:12px;color:var(--dim);font-weight:300; }
.res-annual .val { font-size:20px;font-weight:600;color:var(--blue); }

/* ── CALCULADORA SIMPLES ─────────────────────────────────────── */
.calc-simple { width:240px;flex-shrink:0;align-self:flex-start; }

.cs-display {
  background:linear-gradient(145deg,var(--bg),var(--s1));
  box-shadow:var(--nm-in);
  border:1px solid rgba(255,255,255,0.05);
  border-radius:10px;
  padding:12px 14px 10px;
  display:flex;flex-direction:column;align-items:flex-end;gap:2px;
  margin-bottom:14px;
}
.cs-expr { font-size:10.5px;color:var(--muted);min-height:15px;letter-spacing:0.2px;font-weight:300; }
.cs-val  { font-size:26px;font-weight:500;color:var(--text);letter-spacing:-0.5px;word-break:break-all; }

.cs-grid { display:grid;grid-template-columns:repeat(4,1fr);gap:6px; }

.cs-btn {
  padding:0;height:42px;border-radius:10px;border:none;cursor:pointer;
  font-size:14px;font-weight:400;font-family:var(--font);
  transition:all 0.15s;
}
.cs-btn:active { transform:translateY(1px); }
.cs-wide { grid-column:span 2; }

.cs-num {
  background:linear-gradient(145deg,var(--bg),var(--s1));
  color:var(--text);
  box-shadow:inset 3px 3px 7px rgba(0,0,0,0.35),inset -1px -1px 3px rgba(255,255,255,0.04);
  border:1px solid rgba(255,255,255,0.05);
}
.cs-num:hover { border-color:rgba(50,215,75,0.2); }

.cs-op {
  background:linear-gradient(145deg,var(--bg),var(--s1));
  color:var(--dim);
  box-shadow:inset 3px 3px 7px rgba(0,0,0,0.35),inset -1px -1px 3px rgba(255,255,255,0.04);
  border:1px solid rgba(255,255,255,0.05);
}
.cs-op:hover { color:var(--gb);border-color:rgba(50,215,75,0.2); }

.cs-eq {
  background:linear-gradient(180deg,#42ce6f 0%,#3DBE66 100%);
  color:#0d1117;font-weight:600;
  box-shadow:4px 4px 12px rgba(0,0,0,0.5),-1px -1px 6px rgba(61,190,102,0.2),inset 0 1px 0 rgba(255,255,255,0.2);
  border:none;
}
.cs-eq:hover { background:linear-gradient(180deg,#4ae07a 0%,#36b05a 100%); transform:translateY(-1px); }

/* ── FOOTER ──────────────────────────────────────────────────── */
footer {
  text-align:center;padding:14px;font-size:11px;color:var(--muted);
  border-top:1px solid rgba(255,255,255,0.04);background:var(--s1);
  position:relative;z-index:1;
}

/* ── TOAST ───────────────────────────────────────────────────── */
.toast {
  position:fixed;bottom:24px;right:24px;
  background:var(--s2);
  box-shadow:var(--nm-card);
  border:1px solid rgba(53,196,138,0.2);
  color:var(--gb);font-size:13px;font-weight:400;
  padding:12px 20px;border-radius:12px;
  opacity:0;transform:translateY(8px);
  transition:all 0.3s cubic-bezier(.34,1.56,.64,1);
  pointer-events:none;z-index:999;
}
.toast.show { opacity:1;transform:translateY(0); }

/* ── REGISTRO ────────────────────────────────────────────────── */
.registro-section {
  margin:0 32px 32px;background:var(--s1);
  box-shadow:var(--nm-card);border-radius:var(--radius-lg);overflow:hidden;
  position:relative;z-index:1;
}
.registro-header {
  display:flex;align-items:center;justify-content:space-between;
  padding:12px 20px;border-bottom:1px solid rgba(255,255,255,0.04);background:var(--s2);
}
.registro-title {
  display:flex;align-items:center;gap:8px;
  font-size:9.5px;font-weight:500;color:var(--dim);
  text-transform:uppercase;letter-spacing:2.5px;
}
.registro-count {
  background:var(--gd);border:1px solid rgba(53,196,138,0.25);color:var(--gb);
  font-size:10px;font-weight:500;padding:1px 8px;border-radius:100px;
}
.btn-limpar {
  display:flex;align-items:center;gap:5px;padding:5px 12px;
  border-radius:8px;border:1px solid rgba(255,255,255,0.05);
  background:linear-gradient(145deg,var(--s2),var(--s3));
  color:var(--dim);font-size:11px;font-weight:400;font-family:var(--font);
  cursor:pointer;box-shadow:var(--nm-btn);transition:all 0.15s;
}
.btn-limpar:hover { color:var(--red);border-color:rgba(224,80,80,0.25);box-shadow:var(--nm-out); }

.registro-body { overflow-x:auto; }
.registro-empty { padding:28px;text-align:center;font-size:13px;color:var(--dim);font-weight:300; }

.reg-table { width:100%;border-collapse:collapse;font-size:13px; }
.reg-table th {
  padding:9px 16px;text-align:left;font-size:9.5px;font-weight:500;
  text-transform:uppercase;letter-spacing:2px;color:var(--muted);
  border-bottom:1px solid rgba(255,255,255,0.04);white-space:nowrap;
}
.reg-table td {
  padding:10px 16px;border-bottom:1px solid rgba(255,255,255,0.03);
  color:var(--text);vertical-align:middle;font-weight:300;
}
.reg-table tr:last-child td { border-bottom:none; }
.reg-table tr:hover td { background:var(--s2); }

.reg-tel  { color:var(--dim);font-size:12px; }
.reg-eco  { color:var(--gb);font-weight:500; }
.reg-time { color:var(--muted);font-size:12px; }

.reg-link {
  display:inline-flex;align-items:center;gap:4px;padding:4px 10px;
  border-radius:8px;border:1px solid rgba(255,255,255,0.05);
  background:linear-gradient(145deg,var(--s2),var(--s3));
  color:var(--dim);font-size:11px;font-weight:400;
  text-decoration:none;box-shadow:var(--nm-btn);transition:all 0.15s;white-space:nowrap;
}
.reg-link:hover { color:var(--gb);box-shadow:var(--nm-out); }

</style>

<main>

  <!-- FORM -->
  <div class="card">

    <script>
      var _calcTimer = null;
      var _dotsHTML  = '<span class="loading-dots"><span></span><span></span><span></span></span>';

      function zerarCalculo() {
        ['calcSem','calcCom','calcEco','calcAnual'].forEach(function(id){
          document.getElementById(id).textContent = '—';
        });
      }

      function mostrarDots() {
        ['calcSem','calcCom','calcEco','calcAnual'].forEach(function(id){
          document.getElementById(id).innerHTML = _dotsHTML;
        });
      }

      function revelarValor(id, texto, delay) {
        setTimeout(function() {
          var el = document.getElementById(id);
          el.innerHTML = texto;
          el.classList.remove('calc-reveal');
          void el.offsetWidth;
          el.classList.add('calc-reveal');
        }, delay);
      }
    </script>

    <div class="card-sub">Preencha os dados da fatura para gerar o comparativo detalhado.</div>

    <style>
      .calc-field {
        background: linear-gradient(145deg, var(--bg), var(--s1));
        box-shadow: var(--nm-in);
        border: 1px solid rgba(255,255,255,0.04);
        border-radius: 12px;
        padding: 10px 14px;
        display: flex;
        flex-direction: column;
        gap: 4px;
        margin-bottom: 12px;
      }
      .calc-field label { color: var(--dim); font-size: 11px; margin: 0; font-weight: 400; letter-spacing: 0.3px; }
      @keyframes dotPulse {
        0%,80%,100% { opacity: 0.2; transform: scale(0.8); }
        40%         { opacity: 1;   transform: scale(1); }
      }
      .loading-dots { display: inline-flex; gap: 4px; align-items: center; height: 18px; }
      .loading-dots span {
        width: 5px; height: 5px; border-radius: 50%;
        background: var(--dim);
        animation: dotPulse 1.2s infinite ease-in-out;
      }
      .loading-dots span:nth-child(2) { animation-delay: 0.2s; }
      .loading-dots span:nth-child(3) { animation-delay: 0.4s; }
      @keyframes fadeInUp {
        from { opacity: 0; transform: translateY(6px); }
        to   { opacity: 1; transform: translateY(0); }
      }
      .calc-reveal { animation: fadeInUp 0.3s cubic-bezier(.34,1.56,.64,1) forwards; }
      .calc-val-display {
        font-size: 15px;
        font-weight: 500;
        font-variant-numeric: tabular-nums;
        color: var(--text);
      }
      .calc-val-display.red  { color: var(--red); }
      .calc-val-display.blue { color: var(--blue); }
      .calc-val-display.eco  { color: var(--gb); font-size: 18px; font-weight: 600; }
    </style>

    <div class="section-title">Dados da Fatura</div>

    <div class="row-2">
      <div class="field">
        <label>Consumo total</label>
        <div class="input-wrap">
          <input id="consumo" type="number" placeholder="0" class="has-suffix" oninput="calcularLive()">
          <span class="suffix">kWh</span>
        </div>
      </div>
      <div class="field">
        <label>Tarifa distribuidora (com ICMS)</label>
        <div class="input-wrap">
          <span class="prefix">R$</span>
          <input id="tarifa" type="number" step="0.000001" placeholder="0,000000" class="has-prefix" oninput="calcularLive()">
        </div>
      </div>
    </div>

    <div class="row-2">
      <div class="field">
        <label>Ilum. Pública (CIP)</label>
        <div class="input-wrap">
          <span class="prefix">R$</span>
          <input id="cip" type="number" step="0.01" placeholder="0,00" class="has-prefix" oninput="calcularLive()">
        </div>
      </div>
      <div class="field">
        <label>Valor fatura Distribuidora</label>
        <div class="input-wrap">
          <span class="prefix">R$</span>
          <input id="vlrDistribuidora" type="number" step="0.01" placeholder="0,00" class="has-prefix" oninput="calcularLive()">
        </div>
      </div>
    </div>

<footer>iGreen Energy © 2025 — Simulador interno de economia</footer>
<div class="toast" id="toast">Simulação calculada.</div>


<script>
let dadosCalculados = null;

function fmt(v) {
  return v.toLocaleString('pt-BR', { minimumFractionDigits:2, maximumFractionDigits:2 });
}
function fmt4(v) {
  return v.toLocaleString('pt-BR', { minimumFractionDigits:4, maximumFractionDigits:4 });
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

function g(id) { return parseFloat(document.getElementById(id).value) || 0; }

function calcularLive() {
  const consumo          = g('consumo');
  const tarifa           = g('tarifa');
  const cip              = g('cip');
  const vlrDistribuidora = g('vlrDistribuidora');
  const boletoIgreen     = g('boletoIgreen');

  if (!consumo || !tarifa) {
    zerarCalculo();
    document.getElementById('resultArea').innerHTML = '';
    return;
  }

  // Fórmula: Treinamento de Cálculo COMERC — Passo a Passo
  // Sem desconto = (consumo × tarifa distribuidora) + CIP
  // Com desconto = fatura distribuidora + boleto iGreen
  const semDesconto = (consumo * tarifa) + cip;
  const comDesconto = vlrDistribuidora + boletoIgreen;
  const economia    = semDesconto - comDesconto;

  if (_calcTimer) clearTimeout(_calcTimer);
  mostrarDots();
  _calcTimer = setTimeout(function() {
    function rv(id, v, d) {
      setTimeout(function() {
        var el = document.getElementById(id);
        el.innerHTML = 'R$ ' + fmt(v);
        el.classList.remove('calc-reveal');
        void el.offsetWidth;
        el.classList.add('calc-reveal');
      }, d);
    }
    rv('calcSem', semDesconto, 0);
    rv('calcCom', comDesconto, 200);
    rv('calcEco', economia,    400);
    rv('calcAnual', economia * 12, 400);

    var frame = document.getElementById('popFrame');
    if (frame && frame.contentWindow) {
      frame.contentWindow.postMessage({ type:'igreen-eco', ecoMes: economia, eco12: economia * 12 }, '*');
    }

    const energiaEletrica = consumo * tarifa;
    const anual = economia * 12;
    const pct   = semDesconto > 0 ? ((economia / semDesconto) * 100) : 0;
    const area  = document.getElementById('resultArea');
    area.innerHTML = `
      <div class="res-body">
        <div class="res-row">
          <span class="lbl">${consumo} kWh × R$ ${fmt4(tarifa)}/kWh</span>
          <span class="val">R$ ${fmt(energiaEletrica)}</span>
        </div>
        <div class="res-row">
          <span class="lbl">+ Contribuição de Iluminação Pública (CIP)</span>
          <span class="val">R$ ${fmt(cip)}</span>
        </div>
        <div class="res-divider"></div>
        <div class="res-row">
          <span class="lbl"><b>= Valor sem desconto</b></span>
          <span class="val red">R$ ${fmt(semDesconto)}</span>
        </div>
        <div class="res-row">
          <span class="lbl">Fatura Distribuidora</span>
          <span class="val">R$ ${fmt(vlrDistribuidora)}</span>
        </div>
        <div class="res-row">
          <span class="lbl">+ Boleto iGreen</span>
          <span class="val">R$ ${fmt(boletoIgreen)}</span>
        </div>
        <div class="res-row">
          <span class="lbl"><b>= Total real pago</b></span>
          <span class="val green">R$ ${fmt(comDesconto)}</span>
        </div>
        <div class="res-divider"></div>
        <div class="res-row">
          <span class="lbl">Desconto real<small>Economia ÷ Sem desconto</small></span>
          <span class="val" style="color:var(--gb);font-size:15px;font-weight:600;">${pct.toFixed(1)}%</span>
        </div>
      </div>
    `;
  }, 400);
}

/* ── CALCULADORA SIMPLES ── */
let _csExpr = '', _csPrevOp = '', _csCurrent = '0', _csJustEq = false;

function csRender() {
  document.getElementById('csExpr').textContent = _csExpr;
  document.getElementById('csVal').textContent  = _csCurrent || '0';
}
function csAc() { _csExpr='';_csPrevOp='';_csCurrent='0';_csJustEq=false; csRender(); }
function csPlusMinus() {
  _csCurrent = _csCurrent.startsWith('-') ? _csCurrent.slice(1) : (_csCurrent === '0' ? '0' : '-'+_csCurrent);
  csRender();
}
function csInput(v) {
  const ops = ['+','-','*','/'];
  if (ops.includes(v)) {
    if (_csCurrent !== '') {
      if (_csPrevOp) {
        try { _csCurrent = String(parseFloat(eval(_csExpr + _csCurrent).toFixed(10))); } catch(e) {}
      }
      _csExpr = _csCurrent + (v==='*'?'×':v==='/'?'÷':v);
      _csPrevOp = v;
      _csCurrent = '';
    }
  } else {
    if (_csJustEq) { _csExpr='';_csPrevOp='';_csJustEq=false; _csCurrent=''; }
    if (v === '.' && _csCurrent.includes('.')) return;
    if (_csCurrent === '0' && v !== '.') _csCurrent = v;
    else _csCurrent += v;
  }
  csRender();
}
function csEqual() {
  if (!_csExpr || _csCurrent === '') return;
  try {
    const expr = _csExpr.replace(/×/g,'*').replace(/÷/g,'/');
    const res  = eval(expr + _csCurrent);
    _csExpr    = _csExpr + _csCurrent + ' =';
    _csCurrent = String(parseFloat(res.toFixed(10)));
    _csPrevOp  = ''; _csJustEq = true;
  } catch(e) { _csCurrent = 'Erro'; }
  csRender();
}

document.addEventListener('keydown', function(e) {
  if (document.activeElement && ['INPUT','TEXTAREA'].includes(document.activeElement.tagName)) return;
  const k = e.key;
  if ('0123456789'.includes(k))      csInput(k);
  else if (k === '.')                csInput('.');
  else if (k === '+')                csInput('+');
  else if (k === '-')                csInput('-');
  else if (k === '*')                csInput('*');
  else if (k === '/')                { e.preventDefault(); csInput('/'); }
  else if (k === 'Enter' || k === '=') csEqual();
  else if (k === 'Backspace')        {
    if (_csJustEq) { csAc(); return; }
    _csCurrent = _csCurrent.length > 1 ? _csCurrent.slice(0,-1) : '0';
    csRender();
  }
  else if (k === 'Escape')           csAc();
});

</script>
